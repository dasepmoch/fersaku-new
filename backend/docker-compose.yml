# Local development stack only (ADR-0007: compose is never production topology).
# Ports chosen to avoid host conflicts: API 18080, Postgres 5433, Redis 6380,
# Mailpit 8025/1025, MinIO 9000/9001.
# No production credentials — placeholders and local-only defaults only.
#
# From backend/:
#   make compose-up
#   docker compose up -d postgres redis minio mailpit
#   docker compose up --build api worker

name: fersaku-backend

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    image: fersaku-api:local
    # Binary via Dockerfile ENTRYPOINT [/app/fersaku-api]; do not duplicate as command.
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    environment:
      APP_ENV: ${APP_ENV:-local}
      HTTP_ADDR: ${HTTP_ADDR:-:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgres://fersaku:fersaku_local@postgres:5432/fersaku?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      XENDIT_MODE: ${XENDIT_MODE:-fake}
      SESSION_SECRET: ${SESSION_SECRET:-local-dev-session-secret-not-for-prod}
      CSRF_SECRET: ${CSRF_SECRET:-local-dev-csrf-secret-not-for-prod}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      R2_BUCKET_PUBLIC: ${R2_BUCKET_PUBLIC:-fersaku-public}
      R2_BUCKET_PRIVATE: ${R2_BUCKET_PRIVATE:-fersaku-private}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-mailpit}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-1025}
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: worker
    image: fersaku-worker:local
    # Binary via Dockerfile ENTRYPOINT [/app/fersaku-worker]; no public ports.
    env_file:
      - path: .env
        required: false
      - path: .env.example
        required: false
    environment:
      APP_ENV: ${APP_ENV:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgres://fersaku:fersaku_local@postgres:5432/fersaku?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      XENDIT_MODE: ${XENDIT_MODE:-fake}
      SESSION_SECRET: ${SESSION_SECRET:-local-dev-session-secret-not-for-prod}
      CSRF_SECRET: ${CSRF_SECRET:-local-dev-csrf-secret-not-for-prod}
      R2_ENDPOINT: ${R2_ENDPOINT:-http://minio:9000}
      R2_BUCKET_PUBLIC: ${R2_BUCKET_PUBLIC:-fersaku-public}
      R2_BUCKET_PRIVATE: ${R2_BUCKET_PRIVATE:-fersaku-private}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-minioadmin}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-minioadmin}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-mailpit}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-1025}
      WORKER_RUN_ONCE: ${WORKER_RUN_ONCE:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    # No public ports — worker has no HTTP listener.

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fersaku
      POSTGRES_PASSWORD: fersaku_local
      POSTGRES_DB: fersaku
    ports:
      - "5433:5432"
    volumes:
      - fersaku_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fersaku -d fersaku"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6380:6379"
    volumes:
      - fersaku_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - fersaku_minio_data:/data
    # MinIO server image has no mc/curl; readiness is via minio-init + depends_on started.
    restart: unless-stopped

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Waiting for MinIO..."
        until mc alias set local http://minio:9000 minioadmin minioadmin; do sleep 1; done
        mc mb --ignore-existing local/fersaku-public
        mc mb --ignore-existing local/fersaku-private
        mc anonymous set none local/fersaku-private
        echo "MinIO buckets ready: fersaku-public, fersaku-private"
    restart: "no"

  mailpit:
    image: axllent/mailpit:v1.22
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    restart: unless-stopped

volumes:
  fersaku_pg_data:
  fersaku_redis_data:
  fersaku_minio_data:
