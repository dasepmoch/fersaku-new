# sqlc configuration — BE-100 foundation (outbox, idempotency, audit stub).
version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/adapters/postgres/queries"
    schema: "migrations"
    gen:
      go:
        package: "gen"
        out: "internal/adapters/postgres/gen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            go_type: "time.Time"
