components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: fersaku_session
      description: HttpOnly opaque browser session cookie. Required for authenticated browser/SSR surfaces. Pair unsafe methods
        with X-CSRF-Token when CSRF is enforced.
    merchantApiKey:
      type: http
      scheme: bearer
      bearerFormat: fsk_
      description: 'Merchant gateway API key (Authorization: Bearer fsk_test_* sandbox / fsk_live_* live). Payment-only scope
        under /v1/gateway and deprecated /v1/qris. Never cookie, query, or public FE env. LIVE create requires ACTIVE QRIS_API
        capability (KYC).'
    xenditCallbackToken:
      type: apiKey
      in: header
      name: X-Callback-Token
      description: Inbound Xendit provider callback token. Constant-time verified before any business mutation. Not a session
        cookie and not a merchant API key.
    capabilityToken:
      type: apiKey
      in: header
      name: X-Capability-Token
      description: 'Optional capability/scoped token for non-session public flows (checkout owner proof, delivery access).
        Distinct from sessionCookie and merchantApiKey. When absent, operation may still allow public access via empty security:
        [] where declared.'
  headers:
    XRequestID:
      description: Correlation request ID (echoed; generated if missing). Clients may send X-Request-ID.
      schema:
        type: string
    RetryAfter:
      description: Seconds to wait before retry (rate limit / async).
      schema:
        type: integer
        minimum: 0
    XCSRFToken:
      description: Session-bound CSRF token required on cookie+unsafe methods when CSRF is enforced.
      schema:
        type: string
  schemas:
    AdminActionInput:
      type: object
      required:
      - action
      - resourceId
      - reason
      properties:
        action:
          type: string
          enum:
          - buyer.sessions.revoke
          - buyer.magic_link.send
          - buyer.email_change.start
          - review.moderate
          - merchant.status.update
          - merchant.api_access.update
          - merchant.api_credentials.rotate
          - order.delivery.resend
          - payment.provider.verify
          - withdrawal.review
        resourceId:
          type: string
        status:
          type: string
        sessionId:
          type: string
        reason:
          type: string
        idempotencyKey:
          type: string
        recentMfaProof:
          type: string
        newEmail:
          type: string
    AdminActionResult:
      type: object
      required:
      - accepted
      - action
      - resourceId
      - requestId
      properties:
        accepted:
          type: boolean
        action:
          type: string
        resourceId:
          type: string
        requestId:
          type: string
    ImpersonationScope:
      type: string
      description: Only READ_ONLY and SUPPORT_WRITE; PRIVILEGED/FULL absent and rejected
      enum:
      - READ_ONLY
