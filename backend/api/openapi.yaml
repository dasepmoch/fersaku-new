openapi: 3.0.3
info:
  title: Fersaku API
  version: 0.0.1
  description: "Fersaku hosted storefront and QRIS payment gateway API. Transport contract (BE-110): success envelope, problem\
    \ errors, cursor meta. Identity/session lifecycle (BE-120): cookie sessions, Argon2id, CSRF, MFA. Account profile/security/preferences\
    \ (BE-125): profile versioning, password change, dual-confirm email change, MFA disable, notification preferences. RBAC/tenant\
    \ authorization (BE-130): permission registry, system roles, merchant membership, RequirePermission middleware; sample\
    \ admin/seller/buyer authz routes. Roles/assignments/invitations (BE-135): custom role CRUD, anti-escalation, staff/merchant\
    \ invitations with §6.5 POST body token accept (GET cannot consume). Notification inbox/dispatch foundation (BE-140):\
    \ recipient-scoped inbox list/read/read-all/badge, closed event registry aligned with BE-125 mandatory/optional prefs,\
    \ outbox email/dispatch jobs, CTA sanitization (relative internal only). Buyer/admin/seller notification paths are thin\
    \ aliases. Merchant/store onboarding (BE-200): mandatory canonical store, slug normalize/availability, idempotent POST\
    \ /v1/onboarding/store, progress patch, complete without product (ADR-0007). Fee policy/value objects (BE-300): pure int64\
    \ whole-IDR calculators (3% half-up + Rp700; withdrawal 3% + provider; min Rp50k), checksum-verified LAUNCH_FEE_POLICY_V1\
    \ seed, public GET /v1/platform/fees, admin read/preview only; no fee publish/mutate endpoints (ADR-0003). Hosted checkout/order\
    \ intent (BE-310): server-priced POST /v1/checkout/intents with Idempotency-Key, coupon/stock reserve, fee snapshot, fake\
    \ Xendit QRIS create; GET intent/order poll; expire request with UNKNOWN_OUTCOME safety (no blind stock release); simulate-payment\
    \ local/test only. QRIS Payment Gateway API (BE-320): merchant API-key auth (Bearer fsk_*), payment-only create/status/cancel/events\
    \ under /v1/gateway (legacy /v1/qris aliases with Deprecation); source=QRIS_API; sandbox isolated; LIVE requires capability\
    \ (KYC gate stub); webhookEndpointId only (never webhookUrl); redirect origins allowlist never server-fetched. Inbound\
    \ Xendit callback finalization (BE-330): POST /v1/webhooks/xendit with X-Callback-Token (constant-time); invalid token/oversize/malformed\
    \ → provider_callback_rejections only; valid events unique on (provider, account_scope, payment_mode, provider_event_id);\
    \ paid + settlement + coupon redeem + delivery grant exactly once; late paid after expire alerted; admin GET/POST /v1/admin/provider-callbacks/{callbackId}/replay\
    \ (provider_callbacks.replay) never accepts outbound seller delivery IDs. Unified ledger/balance (BE-340): double-entry\
    \ journals via post_ledger_transaction, merchant available/pending/held projections, STOREFRONT|QRIS_API source breakdown,\
    \ settlement lots FIFO helpers, rebuild verifier; GET /v1/stores/{storeId}/finance/summary|ledger|revenue and /v1/seller/finance/*\
    \ aliases; money int64 IDR. Bank/withdrawal/disbursement (BE-350): encrypted bank accounts, idempotent POST withdrawal-quotes\
    \ (min Rp50k, 3%+provider fee, quote TTL), consume quote + reserve + FIFO allocation, DisbursementProvider (fake Xendit),\
    \ UNKNOWN_OUTCOME same-reference resolver, equal/higher/lower actual-fee journals; admin review approve/hold/reject. Storefront\
    \ attribution analytics (BE-360): capture stripped UTM/referrer/landing at checkout; immutable order_attribution_snapshots\
    \ convert once on verified PAID (incl. late-paid); rebuildable store_traffic_daily; GET /v1/stores/{storeId}/analytics/overview|traffic|traffic/export;\
    \ QRIS_API never invents storefront traffic; responses/exports never include raw visitor hashes.\n KYC live QRIS API workflow\
    \ (BE-400): merchant submit case + server-mediated document stream (size/type/scan/\n envelope-encrypt; ciphertext only\
    \ to private R2; no browser-to-R2 KYC presign); admin queue/detail/transition\n (reject/clarification require reason);\
    \ APPROVE enables LIVE merchant_api_capabilities QRIS_API + AUTHORIZED\n issuance request/outbox (raw live key claim is\
    \ BE-410). Storefront sellers never forced through KYC.\n  Outbound seller-webhook delivery (BE-420): store-scoped endpoint\
    \ CRUD with HTTPS SSRF validation (registration\n  and every delivery; private/loopback/metadata rejected), independent\
    \ endpoint signing secret claim (API-key\n  lifecycle separate), outbox seller_webhook.deliver with stable event ID +\
    \ immutable body + fresh timestamp/signature\n  per attempt, retry/jitter/dead-letter; admin GET/POST /v1/admin/seller-webhook-deliveries\
    \ (never inbound\n  provider-callback IDs; separate from /v1/admin/provider-callbacks).\n  Buyer identity/purchases/delivery/reviews\
    \ (BE-430): magic-link BUYER surface (auth), /v1/buyer/profile+sessions\n  aliases, purchase list/detail ownership via\
    \ orders.buyer_user_id, delivery access/resend/invoice (BE-235),\n  verified reviews only after paid+delivered grant;\
    \ public product review list/summary; public invoice verify\n  returns safe fields only (no buyer PII/secrets).\n  Admin\
    \ read models (BE-500): permissioned GET /v1/admin/overview(+platform-volume), merchants, buyers(+purchases/sessions),\n\
    \  orders, payments (source STOREFRONT|QRIS_API only), withdrawals (source may include MIXED), inventory (redacted no-store),\n\
    \  fulfillments, reviews, users lookup for impersonation target; cursor/status/date filters + export limit;\n  inbound\
    \ provider-callbacks list/detail (webhooks.read) separate from outbound seller-webhook-deliveries;\n  never raw callback/signature/secret\
    \ payload; no /admin/risk|/disputes|/reconciliation.\n  Eight lightweight admin operations (BE-510): POST /v1/admin/actions\
    \ (closed AdminActionInput union, reason required),\n  merchant status vs API access suspend independently, KYC age/reason\
    \ queue fields, provider-callback replay (BE-330),\n  fee preview (BE-300), payment-mismatches list, audit-logs search/detail/export/integrity,\
    \ Xendit health + three\n  emergency switches (SELLER_REGISTRATION|QRIS_CHECKOUT|WITHDRAWALS); every mutation permissioned/reasoned/audited.\n\
    \  Admin impersonation (BE-520): POST /v1/admin/users/{userId}/impersonation (explicit target), merchant-owner resolver,\n\
    \  terminate; scopes READ_ONLY|SUPPORT_WRITE only (no PRIVILEGED/FULL); TTL 15|30|60; derived session cookie; SUPPORT_WRITE\n\
    \  allowlist only PATCH /v1/buyer/profile and PATCH /v1/stores/{storeId} presentation fields.\n  Audit/platform/provider\
    \ ops (BE-530): JCS-1 append-only audit chain via SECURITY DEFINER append_audit_event,\n  transactional head/sequence,\
    \ Ed25519 retention-locked checkpoints, streaming verifier (AUDIT_CHAIN_BROKEN on tamper),\n  emergency before/after immutable\
    \ audit, fee policy release-installed/read-only (no runtime publish),\n  Xendit/R2/Redis/mail component health without\
    \ secret exposure.\n  Observability/SLO/runbooks (BE-600): structured log field conventions (request_id, trace_id, business-safe\
    \ ids),\n  GET /metrics Prometheus text (HTTP, payment paid, callback, webhook, outbox lag, audit chain), optional W3C\n\
    \  traceparent + X-Request-ID propagation, synthetic_health.sh, docs/slo.md, docs/runbooks/*, docs/dashboards/*.\nCatalog/storefront\
    \ revisions (BE-210): seller product CRUD/publish/archive (int64 IDR money), public published catalog, storefront draft/revision/ETag\
    \ publish with STOREFRONT_REVISION_CONFLICT. Coupons/checkout reservation (BE-215): seller coupon CRUD/activate/pause/archive\
    \ with optimistic version; integer fixed IDR or bps percent; checkout quote/apply-coupon ignores client discount; reservation\
    \ last-slot limits via Postgres row locks; convert reservation→redemption hook for BE-310/330. R2 object/upload/delivery\
    \ foundation (BE-220): non-KYC presigned upload intent/complete with server-generated create-only keys, checksum/size\
    \ verification, private/public bucket split, short-lived download URLs (Cache-Control private no-store); KYC never uses\
    \ browser-to-R2 presign (BE-400). Inventory/fulfillment foundation (BE-230): versioned inventory schemas, encrypted stock\
    \ items, atomic reserve with FOR UPDATE SKIP LOCKED, per-item reveal (inventory.reveal + reason + no-store), masked list\
    \ DTOs only; no global/batch reveal. Allocate-on-fulfillment hook for CODE delivery (BE-235 expands grants). Store custom-domain\
    \ lifecycle (BE-240): strict IDNA/ASCII hostname normalization, global unique claims, one-time verification token (hashed\
    \ storage), DNS TXT proof via DNSLookup port, edge/TLS provisioner, seller list/create/get/verify/delete, public host-resolve,\
    \ takeover-cooldown tombstones; app auth cookies never set on custom storefront hosts. Cross-tenant IDs prefer RESOURCE_NOT_FOUND;\
    \ missing permission on known actions uses FORBIDDEN. Frontend remains mock-first until adapters switch to this API.\n\
    \n\n## Wire conventions (INT-000)\n- OpenAPI 3.0.3 (do not silently upgrade to 3.1).\n- Money: int64 whole IDR only (MoneyIdr);\
    \ no fractional transactional input.\n- Timestamps: RFC3339 UTC (Rfc3339Timestamp).\n- Success: SuccessEnvelope {data,\
    \ meta}; problems: ProblemEnvelope {problem}.\n- List profiles: CursorListMeta (infinite/prev-next) or NumberedPageListMeta\
    \ (table total/page jump); never mix.\n- Security schemes: sessionCookie, merchantApiKey, xenditCallbackToken, capabilityToken;\
    \ public ops use security: [].\n- Headers: X-Request-ID, X-CSRF-Token, Idempotency-Key, X-Audit-Reason, X-Recent-MFA-Proof,\
    \ If-Match, Retry-After.\n- x-internal / tag internal: scaffold, _test, simulate-payment, gateway reject stubs — not production\
    \ FE client ops.\n"
servers:
- url: http://localhost:8080
  description: local
tags:
- name: health
- name: metrics
- name: status
- name: scaffold
- name: auth
- name: me
- name: admin
- name: seller
- name: buyer
- name: reviews
- name: notifications
- name: onboarding
- name: stores
- name: catalog
- name: public
- name: coupons
- name: checkout
- name: objects
- name: inventory
- name: domains
- name: delivery
- name: fees
- name: platform
- name: gateway
- name: finance
- name: withdrawals
- name: analytics
- name: kyc
- name: seller-webhooks
- name: credentials
- name: internal
  description: Local/test/scaffold only — not production client surface
- name: webhooks
  description: Inbound provider webhooks
paths:
  /v1/stores/{storeId}/webhooks:
    get:
      operationId: listSellerWebhooks
      summary: List outbound webhook endpoints for a store
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: Endpoint list (masked secret metadata only)
        '401':
          description: Authentication required
        '404':
          description: Store not found
      security:
      - sessionCookie: []
    post:
      operationId: createSellerWebhook
      summary: Register outbound HTTPS endpoint (SSRF-validated) + one-time secret claim
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - url
              - paymentMode
              properties:
                url:
                  type: string
                  description: HTTPS URL; private networks rejected
                paymentMode:
                  type: string
                  enum:
                  - SANDBOX
                  - LIVE
                eventAllowlist:
                  type: array
                  items:
                    type: string
      responses:
        '201':
          description: Endpoint + claimToken (Cache-Control no-store)
        '400':
          description: Validation / WEBHOOK_URL_PRIVATE_NETWORK
      security:
      - sessionCookie: []
  /v1/stores/{storeId}/webhooks/deliveries:
    get:
      operationId: listSellerWebhookDeliveries
      summary: Seller outbound delivery history
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      responses:
        '200':
          description: Deliveries (no raw payload body/secrets)
      security:
      - sessionCookie: []
  /v1/stores/{storeId}/webhooks/{id}:
    patch:
      operationId: updateSellerWebhook
      summary: Update URL/allowlist or disable endpoint (URL revalidated)
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      - name: id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                eventAllowlist:
                  type: array
                  items:
                    type: string
                disable:
                  type: boolean
                reason:
                  type: string
      responses:
        '200':
          description: Updated endpoint
      security:
      - sessionCookie: []
  /v1/stores/{storeId}/webhooks/{id}/secret-rotation-requests:
    post:
      operationId: rotateSellerWebhookSecret
      summary: Rotate endpoint signing secret (independent of API key)
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '201':
          description: New claimToken for secret (no-store)
      security:
      - sessionCookie: []
  /v1/stores/{storeId}/webhooks/{id}/secret-claims/{claimId}/exchange:
    post:
      operationId: claimSellerWebhookSecret
      summary: One-time webhook secret claim (token in body only)
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: claimId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
                claimToken:
                  type: string
      responses:
        '200':
          description: signingSecret once (Cache-Control no-store)
      security:
      - sessionCookie: []
  /v1/stores/{storeId}/webhooks/{id}/test:
    post:
      operationId: testSellerWebhook
      summary: Enqueue deterministic test=true delivery (no ledger/fulfillment)
      tags:
      - seller-webhooks
      - seller
      parameters:
      - $ref: '#/components/parameters/StoreId'
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Delivery queued
      security:
      - sessionCookie: []
  /v1/admin/seller-webhook-deliveries:
    get:
      operationId: adminListSellerWebhookDeliveries
      summary: Outbound seller delivery admin queue (not provider callbacks)
      tags:
      - admin
      - seller-webhooks
      parameters:
      - name: status
        in: query
        schema:
          type: string
      - name: merchantId
        in: query
        schema:
          type: string
      - name: cursor
        in: query
        schema:
          type: string
      responses:
        '200':
          description: SELLER_DELIVERY rows only
      security:
      - sessionCookie: []
  /v1/admin/seller-webhook-deliveries/{deliveryId}:
    get:
      operationId: adminGetSellerWebhookDelivery
      summary: Outbound delivery detail; rejects inbound provider IDs
      tags:
      - admin
      - seller-webhooks
      parameters:
      - name: deliveryId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Delivery detail
        '404':
          description: Not found or wrong namespace (provider ID)
      security:
      - sessionCookie: []
  /v1/admin/seller-webhook-deliveries/{deliveryId}/retry:
    post:
      operationId: adminRetrySellerWebhookDelivery
      summary: Re-queue outbound delivery (never Xendit replay)
      tags:
      - admin
      - seller-webhooks
      parameters:
      - name: deliveryId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '200':
          description: Delivery re-queued with same eventId/body
        '404':
          description: Not found or inbound provider ID rejected
      security:
      - sessionCookie: []
  /health/live:
    get:
      operationId: healthLive
      summary: Liveness probe
      tags:
      - health
      responses:
        '200':
          description: Process is up
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
      security: []
  /health/ready:
    get:
      operationId: healthReady
      summary: Readiness probe
      tags:
      - health
      responses:
        '200':
          description: Ready to accept traffic
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
        '503':
          description: Not ready
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'
      security: []
  /metrics:
    get:
      operationId: metricsPrometheus
      summary: Prometheus-compatible metrics (BE-600)
      description: 'Process metrics in Prometheus text exposition format. Labels are low-cardinality (route templates, status
        codes, result enums). Restrict scrape access via network policy in production.

        '
      tags:
      - metrics
      responses:
        '200':
          description: Prometheus text
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            text/plain:
              schema:
                type: string
                example: '# HELP fersaku_http_requests_total HTTP requests by method, route template, and status code.

                  # TYPE fersaku_http_requests_total counter

                  fersaku_http_requests_total{method="GET",route="/health/live",status="200"} 1

                  '
      security: []
  /v1/status:
    get:
      operationId: getStatus
      summary: Service status (version, app env; no secrets)
      tags:
      - status
      responses:
        '200':
          description: Status envelope
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusEnvelope'
        default:
          description: Problem response
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
      security: []
  /v1/platform/fees:
    get:
      operationId: getPlatformFees
      summary: Active global fee policy (LAUNCH_FEE_POLICY_V1 at launch)
      description: 'Public read of the active GLOBAL fee policy. STOREFRONT and QRIS_API share the same rule. Admin cannot
        mutate values via API (ADR-0003).

        '
      tags:
      - platform
      - fees
      responses:
        '200':
          description: Active fee policy envelope
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeePolicyEnvelope'
        default:
          description: Problem response
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
      security: []
  /v1/admin/system/fees:
    get:
      operationId: getAdminSystemFees
      summary: Admin read of active fee policy (same as platform fees)
      tags:
      - admin
      - fees
      security:
      - sessionCookie: []
      responses:
        '200':
          description: Active fee policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeePolicyEnvelope'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
        '403':
          description: Missing platform.fees.preview
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
    post:
      operationId: rejectAdminSystemFeesPost
      summary: Rejected — fee policy mutation is not allowed at launch
      tags:
      - admin
      - fees
      security:
      - sessionCookie: []
      responses:
        '405':
          description: Method not allowed (no fee publish)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
    put:
      operationId: rejectAdminSystemFeesPut
      summary: Reject fee PUT
      description: Explicit 405/typed rejection — fee policy is release-installed/read-only (no runtime publish/mutate).
      tags:
      - fees
      - admin
      - internal
      x-internal: true
      x-fersaku-disposition: explicit-rejection
      security:
      - sessionCookie: []
      responses:
        '405':
          description: Method not allowed — fee mutation rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
    patch:
      operationId: rejectAdminSystemFeesPatch
      summary: Reject fee PATCH
      description: Explicit 405/typed rejection — fee policy is release-installed/read-only (no runtime publish/mutate).
      tags:
      - fees
      - admin
      - internal
      x-internal: true
      x-fersaku-disposition: explicit-rejection
      security:
      - sessionCookie: []
      responses:
        '405':
          description: Method not allowed — fee mutation rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
    delete:
      operationId: rejectAdminSystemFeesDelete
      summary: Reject fee DELETE
      description: Explicit 405/typed rejection — fee policy is release-installed/read-only (no runtime publish/mutate).
      tags:
      - fees
      - admin
      - internal
      x-internal: true
      x-fersaku-disposition: explicit-rejection
      security:
      - sessionCookie: []
      responses:
        '405':
          description: Method not allowed — fee mutation rejected
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
  /v1/admin/system/fees/preview:
    post:
      operationId: adminSystemFeesPreview
      summary: Pure fee calculator preview (does not persist or activate policy)
      description: 'Accepts hypothetical gross/withdrawal/provider-fee inputs and always reports the active policy version
        (LAUNCH_FEE_POLICY_V1). Never publishes values.

        '
      tags:
      - admin
      - fees
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeePreviewRequest'
            examples:
              transaction100k:
                value:
                  kind: transaction
                  amount: 100000
                  source: STOREFRONT
              withdrawal100k:
                value:
                  kind: withdrawal
                  amount: 100000
                  providerFee: 2500
      responses:
        '200':
          description: Pure calculation under active policy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeePreviewEnvelope'
        '400':
          description: Validation / fee rejection (below min, non-positive net, fractional)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
  /v1/admin/fees/preview:
    post:
      operationId: adminFeesPreview
      summary: Alias of /v1/admin/system/fees/preview
      tags:
      - admin
      - fees
      security:
      - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FeePreviewRequest'
      responses:
        '200':
          description: Pure calculation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeePreviewEnvelope'
  /v1/_scaffold/echo:
    post:
      operationId: scaffoldEcho
      summary: Strict JSON decoder demo (local/test only; absent in production)
      tags:
      - scaffold
      - internal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScaffoldEchoRequest'
      responses:
        '200':
          description: Echoed payload in success envelope
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScaffoldEchoEnvelope'
        '400':
          description: Validation failed
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
        '429':
          description: Rate limited
          headers:
            X-Request-ID:
              $ref: '#/components/headers/XRequestID'
            Retry-After:
              schema:
                type: integer
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemEnvelope'
      x-internal: true
      x-fersaku-disposition: test-only
      description: 'Env-guarded: mounted only when APP_ENV is local or test. Excluded from production client generation.'
      security: []
  /v1/auth/register:
    post:
      operationId: authRegister
      tags:
      - auth
