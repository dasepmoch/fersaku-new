    FieldViolation:
      type: object
      required:
      - field
      - code
      properties:
        field:
          type: string
        code:
          type: string
          example: INVALID
        message:
          type: string
    MoneyIdr:
      type: integer
      format: int64
      description: Whole-rupiah IDR amount as int64. No fractional input; never float/double for transactional money.
      example: 50000
    Rfc3339Timestamp:
      type: string
      format: date-time
      description: RFC3339 timestamp in UTC (e.g. 2026-07-17T10:00:00Z).
      example: '2026-07-17T10:00:00Z'
    RateLimitProblemEnvelope:
      allOf:
      - $ref: '#/components/schemas/ProblemEnvelope'
      description: 429 rate limit problem; response includes Retry-After header when available.
    ConcurrencyConflictProblemEnvelope:
      allOf:
      - $ref: '#/components/schemas/ProblemEnvelope'
      description: 409 concurrency conflict (e.g. STOREFRONT_REVISION_CONFLICT); use If-Match / expectedRevision.
  parameters:
    XRequestID:
      name: X-Request-ID
      in: header
      required: false
      description: Optional client correlation ID; server echoes or generates.
      schema:
        type: string
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: Client-stable UUID/key for safe mutation replay within TTL.
      schema:
        type: string
        maxLength: 128
    XCSRFToken:
      name: X-CSRF-Token
      in: header
      required: false
      description: Required for session cookie + unsafe HTTP method when CSRF soft-disable is false.
      schema:
        type: string
    StoreId:
      name: storeId
      in: path
      required: true
      schema:
        type: string
      description: Store resource ID
    XAuditReason:
      name: X-Audit-Reason
      in: header
      required: false
      description: Human reason for privileged admin/seller mutations (also accepted in body where documented).
      schema:
        type: string
        minLength: 1
        maxLength: 500
    XRecentMFAProof:
      name: X-Recent-MFA-Proof
      in: header
      required: false
      description: Short-lived recent MFA step-up proof for high-risk mutations (reveal, bank, credentials, admin).
      schema:
        type: string
    IfMatch:
      name: If-Match
      in: header
      required: false
      description: Optimistic concurrency token (ETag/version) for conditional updates.
      schema:
        type: string
    RetryAfter:
      name: Retry-After
      in: header
      required: false
      description: Documented on 429/503 responses; not a request header.
      schema:
        type: integer
    XCallbackToken:
      name: X-Callback-Token
      in: header
      required: true
      description: Xendit inbound callback shared secret token.
      schema:
        type: string
  responses:
    Problem:
      description: Problem envelope
      headers:
        X-Request-ID:
          $ref: '#/components/headers/XRequestID'
        Retry-After:
          $ref: '#/components/headers/RetryAfter'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ProblemEnvelope'
security: []
