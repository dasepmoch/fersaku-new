# QLT-105 — Backend required gates (unit, race, docker, OpenAPI, integration).
# No placeholder jobs; no continue-on-error on P0 gates.
name: Backend CI

on:
  push:
    branches: [main, master]
    paths:
      - "backend/**"
      - "frontend/shared/api/generated/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/redocly.yaml"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "backend/**"
      - "frontend/shared/api/generated/**"
      - "frontend/package.json"
      - "frontend/package-lock.json"
      - "frontend/redocly.yaml"
      - "scripts/**"
      - ".github/workflows/backend-ci.yml"
      - ".github/workflows/ci.yml"

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: backend

jobs:
  backend-unit:
    name: backend-unit (fmt, vet, test, check-generated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go fmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt needed on:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test (must execute tests)
        run: |
          chmod +x ../scripts/ci-assert-go-tests.sh
          ../scripts/ci-assert-go-tests.sh backend-unit -- ./...

      - name: Install sqlc
        run: go install github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0

      - name: check-generated
        run: sh scripts/check-generated.sh

  backend-race:
    name: backend-race (go test -race)
    runs-on: ubuntu-latest
    needs: backend-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: go test -race
        run: |
          chmod +x ../scripts/ci-assert-go-tests.sh
          ../scripts/ci-assert-go-tests.sh backend-race -- -race ./...

  backend-docker:
    name: backend-docker (api + worker images)
    runs-on: ubuntu-latest
    needs: backend-unit
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build --target api -t fersaku-api:ci .

      - name: Build worker image
        run: docker build --target worker -t fersaku-worker:ci .

  # QLT-105: OpenAPI lint + bundle + codegen dirty-diff + router coverage.
  openapi-contract:
    name: openapi-contract (lint, bundle, codegen check, router)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: npm ci (redocly / openapi-typescript)
        working-directory: frontend
        run: npm ci

      - name: Assert contract artefacts non-empty
        working-directory: .
        run: node scripts/ci-assert-suite.mjs openapi-contract

      - name: OpenAPI lint (redocly)
        working-directory: frontend
        run: npm run api:lint

      - name: OpenAPI bundle
        working-directory: frontend
        run: |
          npm run api:bundle
          test -s ../backend/api/openapi.bundle.yaml
          lines=$(wc -l < ../backend/api/openapi.bundle.yaml)
          echo "bundle lines=$lines"
          test "$lines" -ge 100

      - name: Codegen dirty-diff (api:check)
        working-directory: frontend
        run: npm run api:check

      - name: Contract tests (router inventory / OpenAPI drift)
        run: |
          chmod +x ../scripts/ci-assert-go-tests.sh
          ../scripts/ci-assert-go-tests.sh openapi-contract -- -count=1 ./test/contract/...

  # QLT-105: tagged integration + security/tenant/idempotency negatives required.
  backend-integration:
    name: backend-integration (Postgres + security/tenant/idempotency)
    runs-on: ubuntu-latest
    needs: [backend-unit, openapi-contract]
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fersaku
          POSTGRES_PASSWORD: fersaku_local
          POSTGRES_DB: fersaku
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U fersaku -d fersaku"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://fersaku:fersaku_local@localhost:5433/fersaku?sslmode=disable
      REDIS_URL: redis://localhost:6380/0
      APP_ENV: test
      CI: "true"
      QLT_REQUIRE_INTEGRATION: "1"
      XENDIT_MODE: fake
      SESSION_SECRET: ci-session-secret-not-for-prod
      CSRF_SECRET: ci-csrf-secret-not-for-prod
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc

      - name: Assert integration suite non-empty
        working-directory: .
        run: |
          node scripts/ci-assert-suite.mjs backend-integration
          node scripts/ci-assert-suite.mjs qlt-210-integration

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 40); do
            if (echo >/dev/tcp/127.0.0.1/5433) >/dev/null 2>&1; then
              echo "postgres port open"
              exit 0
            fi
            sleep 2
          done
          echo "postgres not ready on :5433" >&2
          exit 1

      - name: Migrate
        run: sh scripts/migrate.sh up

      - name: Integration tests (required; fail if zero tests)
        run: |
          chmod +x ../scripts/ci-assert-go-tests.sh
          ../scripts/ci-assert-go-tests.sh backend-integration -- \
            -tags=integration -count=1 -timeout 20m ./test/integration/...

      # QLT-210 parent smoke: migrate empty/upgrade + concurrent + security negatives.
      - name: Security/migrate/concurrency subset (must run)
        run: |
          set -o pipefail
          go test -tags=integration -count=1 -timeout 10m \
            -run 'TestSecurity_|TestConcurrentIdempotency|TestMigrate|TestAtomicCommit' \
            ./test/integration/ -v | tee /tmp/security-neg.txt
          grep -E '^--- (PASS|FAIL):' /tmp/security-neg.txt | tee /tmp/security-neg-summary.txt
          if grep -E '^--- FAIL:' /tmp/security-neg-summary.txt >/dev/null; then
            echo "security negative failures present" >&2
            exit 1
          fi
          count=$(grep -cE '^--- PASS:' /tmp/security-neg-summary.txt || true)
          echo "security/idempotency/migrate passes=$count"
          test "$count" -ge 5
          # Explicit parent markers (empty-DB migrate + concurrent race).
          grep -E '^--- PASS: TestMigrateUpFromZero' /tmp/security-neg-summary.txt
          grep -E '^--- PASS: TestMigrateUpgradeFromSupportedPrevious' /tmp/security-neg-summary.txt
          grep -E '^--- PASS: TestConcurrentIdempotencyFirstWriterWins' /tmp/security-neg-summary.txt
