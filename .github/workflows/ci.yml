# QLT-105 — Frontend + cross-stack required gates (no no-op jobs).
# Skeleton/path fixes: QLT-100. Activation of all real checks: this file.
name: Frontend quality

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: .

jobs:
  frontend-static:
    name: frontend-static (format, lint, typecheck, unit, security-negative)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Assert Node engines band
        run: |
          node -e "
            const eng = require('./package.json').engines.node;
            const v = process.versions.node;
            console.log('node', v, 'engines', eng);
            const [maj, min] = v.split('.').map(Number);
            if (maj !== 24 || min < 15) {
              console.error('Node must satisfy engines.node (>=24.15.0 <25)');
              process.exit(1);
            }
          "

      - run: npm ci

      - name: Assert unit + security-negative + QLT-300 + QLT-310 + QLT-320 suites are non-empty
        run: |
          node scripts/ci-assert-suite.mjs frontend-unit
          node scripts/ci-assert-suite.mjs security-negative
          node scripts/ci-assert-suite.mjs qlt-300-security
          node scripts/ci-assert-suite.mjs qlt-310-performance
          node scripts/ci-assert-suite.mjs qlt-320-observability

      - run: npm run format:check
      - run: npm run lint -- --max-warnings=0
      - run: npm run typecheck

      # Required security/contract/tenant/idempotency negative coverage (unit).
      # Not continue-on-error — empty or failing suite fails the job.
      - name: Unit + coverage (includes security/contract/tenant/idempotency)
        run: npm run test:coverage

      - run: npm audit --audit-level=high

  frontend-build:
    name: frontend-build (production + bundle budget)
    runs-on: ubuntu-latest
    needs: frontend-static
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm run check:bundle

  frontend-mock-e2e:
    name: frontend-mock-e2e (smoke/critical/a11y/visual)
    runs-on: ubuntu-latest
    needs: frontend-static
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Assert mock e2e + QLT-230 visual/a11y harness present
        run: |
          node scripts/ci-assert-suite.mjs frontend-mock-e2e
          node scripts/ci-assert-suite.mjs qlt-230-visual-a11y

      - run: npx playwright install --with-deps chromium

      # Full mock matrix: smoke + critical + a11y + visual (desktop/mobile projects).
      - name: Playwright mock e2e
        run: npm run test:e2e
        env:
          CI: "true"

      - name: Upload Playwright artifacts (failure only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-mock-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: ignore

  # QLT-105/220: required API-mode harness (QLT-215) + INT-190 + QLT-220 parent.
  # Domain capability cells co-evolve under tests/e2e/api; parent does not claim full matrix.
  # Fails if stack cannot start, seed missing, or tests empty/skipped-only.
  cross-stack-api-e2e:
    name: cross-stack-api-e2e (API stack + harness + INT-190 + QLT-220)
    runs-on: ubuntu-latest
    needs: frontend-static
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - run: npm ci

      - name: Assert API e2e suite non-empty (cross-stack + QLT-220 parent)
        run: |
          node scripts/ci-assert-suite.mjs cross-stack-api-e2e
          node scripts/ci-assert-suite.mjs qlt-220-api-e2e

      - name: Bring up disposable API stack (deps, migrate, seed, api, worker)
        run: |
          chmod +x scripts/e2e-api-stack.sh
          E2E_API_TEARDOWN=0 bash scripts/e2e-api-stack.sh
        env:
          APP_ENV: local
          CI: "true"

      - run: npx playwright install --with-deps chromium

      - name: Playwright API-mode (harness-health + INT-190 + QLT-220 parent)
        run: npm run test:e2e:api
        env:
          CI: "true"
          NEXT_PUBLIC_DATA_SOURCE: api
          API_INTERNAL_URL: http://127.0.0.1:18080
          MAILPIT_URL: http://127.0.0.1:8025
          APP_ENV: local

      - name: Upload API Playwright artifacts (failure only; scrub secret flows in helpers)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-api-artifacts
          path: |
            test-results/api/
            playwright-report/
          if-no-files-found: ignore

      - name: Teardown compose
        if: always()
        run: |
          cd backend && docker compose -f docker-compose.yml down -v || true
